<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  body { margin:0; display:grid; place-items:center; height:100vh; background:#07111F; }
  .icon { width:1024px; height:1024px; border-radius:224px; background:linear-gradient(135deg,#02040A 0%,#07111F 40%,#2a1a4e 100%); position:relative; overflow:hidden; }
  .glow1 { position:absolute; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle,rgba(79,203,255,0.15),transparent 70%); top:100px; left:200px; }
  .glow2 { position:absolute; width:400px; height:400px; border-radius:50%; background:radial-gradient(circle,rgba(106,138,255,0.1),transparent 60%); top:400px; left:50px; }
  .moon { position:absolute; top:200px; left:320px; width:380px; height:380px; border-radius:50%; background:radial-gradient(circle at 35% 30%,#fff8e8,#e8dcc0,#d4c8a4); box-shadow:0 0 80px rgba(212,200,160,0.3),0 0 160px rgba(212,200,160,0.15); }
  .moon-shadow { position:absolute; top:200px; left:320px; width:380px; height:380px; border-radius:50%; background:linear-gradient(135deg,transparent 45%,rgba(10,10,26,0.85) 55%); }
  .stars { position:absolute; inset:0; }
  .star { position:absolute; width:4px; height:4px; border-radius:50%; background:white; }
  .title { position:absolute; bottom:160px; width:100%; text-align:center; font-family:'Cormorant Garamond',Georgia,serif; font-size:96px; font-weight:700; color:#EAF6FF; letter-spacing:4px; }
  .sub { position:absolute; bottom:100px; width:100%; text-align:center; font-family:system-ui; font-size:36px; font-weight:700; color:rgba(79,203,255,0.5); letter-spacing:12px; text-transform:uppercase; }
</style></head><body>
<div class="icon">
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="stars">
    <div class="star" style="top:120px;left:180px;opacity:0.8"></div>
    <div class="star" style="top:80px;left:500px;opacity:0.5;width:3px;height:3px"></div>
    <div class="star" style="top:150px;left:750px;opacity:0.7"></div>
    <div class="star" style="top:300px;left:100px;opacity:0.4;width:5px;height:5px"></div>
    <div class="star" style="top:250px;left:800px;opacity:0.6"></div>
    <div class="star" style="top:600px;left:150px;opacity:0.5;width:3px;height:3px"></div>
    <div class="star" style="top:500px;left:850px;opacity:0.7"></div>
    <div class="star" style="top:700px;left:700px;opacity:0.4"></div>
  </div>
  <div class="moon"></div>
  <div class="moon-shadow"></div>
</div>
</body></html>
