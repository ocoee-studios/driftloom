<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>DriftLoom</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:linear-gradient(135deg,#B8D4E8,#D6EAF8);display:flex;align-items:center;justify-content:center;min-height:100vh}
.ph{width:375px;height:812px;border-radius:52px;border:8px solid rgba(255,255,255,0.6);background:linear-gradient(170deg,#D6EAF8 0%,#E8F4FD 30%,#C5DCF0 60%,#B8D4E8 100%);overflow:hidden;position:relative;box-shadow:0 40px 100px rgba(0,0,0,0.3),0 0 0 1px #B8D4E8}
.nt{width:126px;height:30px;background:rgba(7,17,31,0.8);border-radius:0 0 18px 18px;margin:0 auto;position:relative;z-index:10}
.sc{height:calc(100% - 30px);display:flex;flex-direction:column;position:relative}.sc::-webkit-scrollbar{display:none}.scroll{flex:1;overflow-y:auto}.scroll::-webkit-scrollbar{display:none}
.stars{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:0.1;transform:scale(0.8)}100%{opacity:var(--bright);transform:scale(1.2)}}
@keyframes drift{0%{transform:translateY(0)}100%{transform:translateY(-20px)}}
.scroll{position:relative;z-index:1}
.ct{padding:0 18px 80px}
/* Glass cards matching mockup */
.gc{background:var(--card,rgba(255,255,255,0.35));border:1px solid var(--border,rgba(255,255,255,0.5));border-radius:22px;padding:18px;margin-bottom:12px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 4px 30px rgba(0,0,0,0.05),inset 0 1px 0 rgba(255,255,255,0.4)}
.gc2{background:var(--card,rgba(255,255,255,0.4));border:1px solid var(--border,rgba(255,255,255,0.55));border-radius:22px;padding:20px;margin-bottom:14px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 4px 30px rgba(0,0,0,0.05),inset 0 1px 0 rgba(255,255,255,0.4)}
.tb{height:64px;;display:flex;align-items:center;justify-content:space-around;background:rgba(2,4,10,0.97);border-top:1px solid rgba(79,203,255,0.06);z-index:10;padding-bottom:6px;backdrop-filter:blur(30px)}
.ta{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;min-width:46px;user-select:none;transition:all 0.15s}
.ta .ic{font-size:18px;line-height:1}.ta .lb{font-size:8px;font-weight:700;letter-spacing:0.3px}
.ta.on .ic,.ta.on .lb{color:#0A84FF}.ta .ic,.ta .lb{color:#6A8BAA}
/* Typography */
.ice{color:#07111F}.sil{color:#35516F}.mut{color:#456585}.dim{color:#5A7A95}.dk{color:#6A8BAA}
.cy{color:#0A84FF}
h1{font-size:22px;font-weight:800;letter-spacing:8px;color:#07111F;text-align:center}
h2{font-size:22px;font-weight:700;color:#07111F}
h3{font-size:16px;font-weight:700;color:#07111F}
.tag{font-size:14px;color:#8EAAC5;text-align:center;line-height:22px}
.lbl{font-size:12px;font-weight:600;color:#6A8BAA;margin-bottom:6px}
.slbl{font-size:12px;font-weight:600;color:#8EAAC5;margin-bottom:10px}
/* Inputs matching mockup */
.inp{width:100%;padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.4);color:#07111F;font-size:15px;outline:none;font-family:inherit}
.inp::placeholder{color:#6A8BAA}
textarea.inp{min-height:110px;resize:none}
.btn{padding:16px;border-radius:16px;background:var(--btn,#0A84FF);text-align:center;cursor:pointer;font-weight:700;font-size:15px;color:var(--btn-text,#FFFFFF);margin-bottom:12px}
.bt2{padding:14px;border-radius:16px;border:1.5px solid #0A84FF;text-align:center;cursor:pointer;font-weight:700;font-size:14px;color:#0A84FF;margin-bottom:12px}
.row{display:flex;align-items:center;gap:12px}
.between{display:flex;justify-content:space-between;align-items:center}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat{text-align:center;padding:14px 8px;border-radius:16px;background:var(--card,rgba(255,255,255,0.35));border:1px solid var(--border,rgba(255,255,255,0.5));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.stat .n{font-size:24px;font-weight:800;color:#07111F;margin-top:4px}
.stat .l{font-size:11px;color:#6A8BAA;font-weight:600}
.orb{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;;background:rgba(10,132,255,0.08)}
.divider{border-top:1px solid rgba(79,203,255,0.06);margin:14px 0}
.bar{height:6px;border-radius:3px;background:rgba(10,132,255,0.12);margin-top:6px;overflow:hidden}
.fill{height:100%;border-radius:3px;background:#0A84FF}
.chip{padding:10px 6px;border-radius:14px;text-align:center;cursor:pointer;border:1px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.25);flex:1}
.chip.on{border:1.5px solid #4FCBFF;background:rgba(10,132,255,0.1)}
.chip .em{font-size:22px}.chip .cl{font-size:10px;font-weight:700;margin-top:4px}
.scrollchips{display:flex;gap:6px;padding-bottom:6px;;scrollbar-width:none}.scrollchips::-webkit-scrollbar{display:none}
.wrapgrid{display:flex;flex-wrap:wrap;gap:6px}
[style*=""]::-webkit-scrollbar{display:none}
.fr{padding:14px;border-radius:14px;background:rgba(14,43,92,0.22);border:1px solid rgba(255,255,255,0.4);margin-bottom:8px}
.pill{padding:6px 14px;border-radius:99px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;}
.pillon{border:1.5px solid #0A84FF;color:#0A84FF;background:rgba(10,132,255,0.12)}
.pilloff{border:1px solid rgba(7,17,31,0.12);color:var(--dim,#456585);background:var(--pill-bg,rgba(255,255,255,0.3))}
.settrow{display:flex;align-items:center;padding:16px;border-bottom:1px solid rgba(7,17,31,0.06)}
.settrow:last-child{border:none}
.switch{width:44px;height:24px;border-radius:12px;display:flex;align-items:center;padding:2px;cursor:pointer}
.switch.on{background:#0A84FF;justify-content:flex-end}.switch.off{background:rgba(7,17,31,0.15);justify-content:flex-start}
.switch-dot{width:20px;height:20px;border-radius:10px;background:white}
.group{background:var(--card,rgba(255,255,255,0.3));border:1px solid var(--border,rgba(255,255,255,0.45));border-radius:16px;backdrop-filter:blur(20px);margin-bottom:16px;overflow:hidden}
.techrow{display:flex;align-items:center;gap:14px;padding:16px;border-bottom:1px solid rgba(7,17,31,0.06);cursor:pointer}
.techrow:last-child{border:none}
.signal{padding:18px;border-radius:18px;border:1.5px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.35);backdrop-filter:blur(20px);margin-bottom:14px}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;background:rgba(10,132,255,0.12);color:#0A84FF;border:1px solid rgba(10,132,255,0.2)}
.mo{position:absolute;inset:0;background:rgba(200,220,240,0.97);z-index:20;overflow-y:auto;padding:24px 18px;display:none}.mo.show{display:block}
</style></head><body>

<div class="stars" id="stars"></div><div class="scroll"><div class="ct" id="ct"></div></div>
<div class="tb" id="tb"></div>
</div><div class="mo" id="pw"></div></div>

'<input class="inp" placeholder="\u2315 Search symbols..." style="margin-bottom:10px">'+
'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;;flex-wrap:wrap">'+["All","Nature","People","Places","Objects","Actions"].map(function(x){return '<div class="pill '+(x===dictCat?"pillon":"pilloff")+'" onclick="setDictCat(\x27'+x+'\x27)">'+x+'</div>';}).join("")+'</div>'+
'<div class="gc2" style="padding:0;overflow:hidden"><div style="height:110px;background:linear-gradient(135deg,rgba(14,43,92,0.5),rgba(2,4,10,0.3));display:flex;align-items:center;justify-content:center;font-size:50px">\uD83C\uDF0A</div><div style="padding:14px"><div class="dk" style="font-size:11px">Featured Symbol</div><h2>Water</h2><div class="mut" style="font-size:12px;margin-top:4px;line-height:18px">Emotions, intuition, the unconscious mind, cleansing, flow. Symbols are prompts, not fixed diagnoses.</div><div class="btn" style="margin-top:10px;display:inline-block;padding:8px 16px;font-size:13px">View Symbol</div></div></div>'+
S("Personal Symbol History")+
'<div class="gc">'+R("\uD83C\uDF0A","Water","Most common with calm + curiosity. Last seen 3 nights ago.","12")+R("\uD83D\uDEAA","Doorway","Often appears before a decision or new idea.","9")+R("\u270D","My Meaning","User-defined personal associations are saved here.","Edit")+'</div>'+
S("Expanded Symbol Library")+
'<div class="gc">'+(function(){var syms=[
["\uD83C\uDF0A","Water","Emotions, intuition, cleansing, flow","12 times","Water in dreams represents your emotional state. Calm water suggests inner peace; turbulent water signals emotional upheaval. Rivers often symbolize the flow of life and time. Drowning may reflect feeling overwhelmed. Water appearing frequently means your subconscious is processing deep emotions \u2014 pay attention to the water\x27s behavior, it mirrors yours."],
["\uD83D\uDEAA","Doorway","Thresholds, choices, transitions","9 times","Doorways represent the moment before change. An open door means opportunity is available. A locked door suggests something is blocking your path. Walking through a doorway signals you\x27re ready for a transition. If doorways keep appearing, you\x27re at a decision point in your waking life \u2014 your dreams are rehearsing the choice."],
["\uD83E\uDEB6","Flight","Freedom, perspective, confidence","7 times","Flying dreams are among the most common and exhilarating. They represent freedom from limitations, a desire to rise above problems, or a sense of personal power. If you\x27re flying easily, you feel in control. Struggling to fly suggests self-doubt. Flying dreams often increase during creative breakthroughs."],
["\uD83C\uDF33","Tree","Growth, memory, branching ideas","4 times","Trees symbolize your personal growth, family roots, and branching possibilities. A healthy tree suggests vitality; a dying tree may signal neglected aspects of yourself. Climbing a tree represents ambition. The roots connect to your past, branches to your future. Trees in dreams often appear when you\x27re growing as a person."],
["\u263D","Moon","Cycles, intuition, timing","6 times","The moon in dreams connects to your intuitive side, emotional cycles, and the rhythm of your inner life. A full moon amplifies vividness and emotion. A new moon suggests new beginnings. The moon often appears at turning points \u2014 trust the timing it reveals."],
["\uD83D\uDDDD","Key","Access, hidden knowledge","5 times","Keys represent solutions, access to hidden parts of yourself, and readiness to unlock something new. Finding a key means an answer is close. Losing a key suggests you\x27re not ready yet. A golden key points to something valuable about to be discovered."],
["\uD83C\uDF0A","Ocean","Depth, emotion, creative unknown","5 times","The ocean represents the vast unconscious mind. Its depth mirrors the depth of your emotions and creativity. Calm oceans suggest emotional balance; storms signal inner turmoil. Swimming in the ocean means you\x27re exploring your deeper self. The ocean often appears when deep emotions are stirring."],
["\uD83C\uDFE0","House","Identity, memory, inner rooms","3 times","Houses represent your psyche \u2014 different rooms are different aspects of yourself. The basement is your subconscious. The attic is old memories. Discovering new rooms means you\x27re finding new parts of yourself. A childhood home connects to foundational experiences."],
["\uD83E\uDE9E","Mirror","Self-awareness, reflection, truth","3 times","Mirrors in dreams represent self-examination and truth. Your reflection may look different \u2014 this reveals how you truly see yourself versus how you present to the world. A broken mirror suggests a fractured self-image. Looking into a mirror is your subconscious asking you to be honest."],
["\uD83C\uDF09","Bridge","Connection, transition, integration","2 times","Bridges symbolize transitions between two states of being. Crossing a bridge means you\x27re moving from one life phase to another. A broken bridge suggests fear of change. Building a bridge means you\x27re creating connections. Bridges appear when you\x27re integrating two parts of your life."],
["\uD83D\uDC0D","Snake","Transformation, healing, rebirth","4 times","Snakes represent transformation, hidden fears, and healing energy. A snake shedding its skin signals personal rebirth. Being bitten may mean a wake-up call. Snakes often appear during major personal changes \u2014 they\x27re ancient symbols of renewal and the life force."],
["\uD83E\uDD8B","Butterfly","Rebirth, becoming new","2 times","Butterflies represent transformation and becoming a new version of yourself. The cocoon stage is struggle; the emergence is liberation. Butterflies in dreams signal you\x27re in the process of profound personal change."],
["\uD83D\uDC31","Cat","Independence, mystery, intuition","2 times","Cats in dreams represent independence, mystery, and feminine intuition. A friendly cat suggests you should trust your instincts more. A hostile cat may signal someone in your life is being deceptive. Cats remind you to be self-reliant."],
["\uD83D\uDC26","Bird","Freedom, messages, perspective","3 times","Birds represent freedom, spiritual messages, and the ability to see from a higher perspective. A bird in flight means liberation. A caged bird suggests feeling trapped. Different birds carry different meanings \u2014 eagles for power, doves for peace, ravens for mystery."],
["\u2B50","Stars","Hope, guidance, destiny","2 times","Stars represent hope, direction, and destiny. Looking at stars means you\x27re seeking guidance. A shooting star suggests a wish or fleeting opportunity. Stars remind you to look up from daily concerns and remember the bigger picture."],
["\uD83C\uDF27","Rain","Emotional release, renewal","2 times","Rain symbolizes emotional cleansing and renewal. Gentle rain is healing; storms represent intense emotional processing. Getting wet in rain means you\x27re allowing yourself to feel. Rain often appears after difficult waking experiences as your psyche washes clean."],
["\u2B07","Falling","Loss of control, letting go","3 times","Falling dreams are extremely common and usually reflect anxiety about losing control, fear of failure, or the need to let go. The feeling of falling often jolts you awake \u2014 this is your brain\x27s alarm system. Falling peacefully, however, can mean surrender and trust."],
["\uD83C\uDFC3","Running","Avoidance or pursuit","2 times","Running in dreams reflects avoidance or pursuit in waking life. Being chased means you\x27re avoiding confronting something. Chasing something means you\x27re pursuing a goal. Running in slow motion suggests frustration with progress. The key is: what are you running from or toward?"],
["\uD83D\uDC51","Crown","Authority, self-worth, power","1 times","Crowns represent authority, recognition, and stepping into your power. Wearing a crown means you\x27re ready to lead. Seeing someone else crowned may reflect admiration or envy. Your dream is telling you to own your worth."],
["\u26F0","Mountain","Challenge, ambition, ascent","1 times","Mountains represent challenges, ambition, and spiritual growth. Climbing means you\x27re working toward a goal. Standing at the summit is achievement. Looking up at a mountain may feel overwhelming but also inspiring. The journey matters as much as the peak."],
["\uD83D\uDD04","Recurring","Unresolved message repeating","3 times","Recurring dreams carry an unresolved message from your subconscious. They repeat because you haven\x27t addressed the underlying issue. Pay attention to what stays the same across repetitions \u2014 that\x27s the core message. Once you address it in waking life, the dream usually stops."],
["\uD83D\uDD2E","Prophetic","Dreams that predict events","1 times","Some dreams seem to predict future events. Whether this is pattern recognition, intuition, or something deeper, prophetic dreams feel qualitatively different \u2014 more vivid, more certain. Keep a record and note when a dream\x27s imagery later appears in waking life."],
["\uD83D\uDC3A","Wolf","Instinct, loyalty, wildness","2 times","Wolves represent your primal instincts, loyalty to your pack, and untamed aspects of yourself. A lone wolf suggests independence; a wolf pack reflects community. Wolves howling at the moon connect you to your intuitive, wild nature. If a wolf guides you, follow \u2014 it knows the path through darkness."],
["\uD83E\uDD85","Eagle","Vision, power, spiritual height","1 times","Eagles represent far-seeing vision, power, and the ability to soar above earthly concerns. An eagle in your dream says you need the big picture right now. Eagles also represent authority and the courage to act decisively from a place of clarity."],
["\uD83D\uDC0E","Horse","Freedom, drive, vitality","1 times","Horses symbolize raw energy, freedom, and personal drive. A galloping horse means momentum is building. A wild horse represents untamed passion or desire. Riding a horse smoothly suggests you\x27re in harmony with your energy. A horse that won\x27t move may signal blocked motivation."],
["\uD83D\uDD25","Fire","Passion, destruction, renewal","3 times","Fire in dreams is powerful and dual-natured. It can represent passion, anger, transformation, or creative energy. A controlled fire (candle, campfire) is warmth and inspiration. A wildfire is overwhelming emotion. Walking through fire unharmed means you\x27re emerging stronger from a trial."],
["\u2744","Ice/Snow","Isolation, clarity, preservation","1 times","Ice and snow in dreams represent emotional coldness, clarity of thought, or feelings of isolation. A frozen landscape may mean you\x27re shutting down emotionally. Fresh snow is purity and a clean start. Melting ice suggests thawing emotions and new openness."],
["\uD83C\uDF0B","Volcano","Suppressed emotions, eruption","1 times","Volcanoes represent emotions you\x27ve been suppressing that are building toward eruption. A dormant volcano is a warning \u2014 pressure is accumulating. An erupting volcano means those feelings are finally breaking through. This is often cathartic rather than destructive."],
["\u26A1","Lightning","Sudden insight, revelation","1 times","Lightning represents sudden clarity, inspiration, or shock. It\x27s the moment of realization that changes everything. Lightning illuminates darkness briefly \u2014 your dream is showing you something important that you might miss if you don\x27t pay attention right now."],
["\uD83C\uDF08","Rainbow","Hope, promise, integration","1 times","Rainbows symbolize hope after difficulty, promises kept, and the integration of different aspects of yourself. Seeing a rainbow after a dream storm means the emotional difficulty is resolving. Rainbows also represent the full spectrum of human experience."],
["\uD83D\uDD70","Clock","Time anxiety, urgency, mortality","2 times","Clocks in dreams reflect your relationship with time. A clock running fast means you feel time is slipping away. A stopped clock suggests you\x27re stuck. Clocks without numbers mean you\x27ve lost track of priorities. Time pressure in dreams often mirrors deadline stress in waking life."],
["\uD83D\uDC76","Baby","New beginnings, vulnerability","2 times","Babies in dreams represent new projects, ideas, or aspects of yourself that need nurturing. Forgetting a baby suggests neglecting something new and important. A happy baby means your new venture is thriving. This is rarely about actual babies \u2014 it\x27s about what\x27s newly born in your life."],
["\uD83D\uDE97","Vehicle","Life direction, control","2 times","Vehicles represent your path through life and how much control you feel. Driving smoothly = on track. Car out of control = life feels chaotic. Backseat = someone else is controlling your direction. The condition of the vehicle reflects your sense of personal power."],
["\uD83D\uDC80","Death","Transformation, endings, rebirth","1 times","Death in dreams almost never predicts literal death. It represents the end of something \u2014 a relationship, a phase, a belief, a habit. Dream death makes room for something new. It\x27s one of the most transformative dream symbols and often precedes major personal growth."],
["\u2696","Scales/Balance","Justice, decision, equilibrium","1 times","Scales represent a decision that needs to be weighed carefully. You\x27re trying to balance competing demands. Tipped scales suggest an imbalance in your life that needs correcting. This symbol often appears when fairness is a concern."],
["\uD83D\uDCDA","Book","Knowledge, memory, life story","1 times","Books represent accumulated knowledge, memory, and your personal narrative. An open book means you\x27re ready to learn. A closed book suggests hidden information. Writing in a book means you\x27re actively creating your story. A library represents the vast repository of your experiences."],
["\uD83C\uDFF0","Castle","Ambition, protection, isolation","1 times","Castles represent your ambitions, the walls you build around yourself, and your sense of personal sovereignty. Exploring castle rooms mirrors self-discovery. A castle under siege suggests your defenses are being tested. A ruined castle may mean old ambitions need rebuilding."],
["\uD83C\uDF0C","Galaxy/Space","Infinite possibility, insignificance","1 times","Space and galaxies represent the vastness of possibility and your place in something larger than yourself. Floating in space can feel liberating or terrifying depending on context. Stars represent goals. Black holes represent fears of the unknown. Space dreams expand your perspective."],
["\uD83D\uDC8D","Ring","Commitment, cycles, wholeness","1 times","Rings symbolize commitment, eternal cycles, and completeness. Finding a ring suggests a commitment is forming. Losing a ring means anxiety about a relationship or promise. A broken ring signals broken trust. The circle shape represents something that has no end."],
["\uD83C\uDFA8","Colors","Emotional states, energy","2 times","Vivid colors in dreams amplify emotional content. Red = passion/anger. Blue = calm/sadness. Green = growth/healing. Gold = wisdom/value. Black = unknown/fear. White = purity/clarity. Purple = spirituality. If your dream is unusually colorful, your emotions are running high."],
["\uD83E\uDDD1\u200D\uD83E\uDD1D\u200D\uD83E\uDDD1","Strangers","Unknown self, new aspects","2 times","Strangers in dreams often represent parts of yourself you haven\x27t met yet. A helpful stranger is your inner wisdom. A threatening stranger is a fear you haven\x27t faced. Pay attention to what the stranger says or does \u2014 they\x27re delivering a message from your subconscious."],
["\uD83C\uDFB6","Music","Harmony, emotion, memory","1 times","Music in dreams connects to deep emotional states and memories. Hearing beautiful music means you\x27re in harmony. Discordant music signals internal conflict. Specific songs may trigger important memories. If you\x27re making music, you\x27re expressing something that words can\x27t capture."],
["\u2602","Umbrella","Protection, preparedness","1 times","Umbrellas represent your emotional defenses and preparedness for difficulties. An open umbrella means you\x27re shielding yourself effectively. A broken umbrella suggests your defenses aren\x27t working. Forgetting your umbrella means you feel unprepared for emotional challenges ahead."],
["\uD83C\uDF3B","Garden","Inner growth, tended potential","1 times","Gardens represent the parts of yourself you actively cultivate. A flourishing garden means your efforts are bearing fruit. A neglected garden suggests you\x27re ignoring personal growth. Planting seeds is setting intentions. Weeds represent problems you\x27ve been avoiding."],
["\uD83E\uDEA8","Teeth","Self-image, anxiety, power","3 times","Teeth falling out is one of the most common dream symbols worldwide. It reflects anxiety about appearance, communication, or personal power. Losing teeth = feeling powerless or embarrassed. Strong teeth = confidence. This dream often surfaces during times of change or self-doubt."],
["\uD83D\uDE36","Being Naked","Vulnerability, exposure, truth","2 times","Dreaming of being naked in public reflects vulnerability, fear of exposure, or the desire to be your authentic self. If others notice, you fear judgment. If nobody cares, your anxiety is self-imposed. This dream asks: what are you trying to hide, and what happens if you stop?"],
["\u231B","Hourglass","Time running out, patience","1 times","Hourglasses represent the passage of time and a sense that something is finite. An hourglass running out creates urgency. A full hourglass suggests you have more time than you think. Flipping an hourglass means you\x27re resetting or getting a second chance."]

S("Expanded Symbol Library")+
'<div class="gc">'+(function(){var syms=[
["\uD83C\uDF0A","Water","Emotions, intuition, cleansing, flow","12 times","Water in dreams represents your emotional state. Calm water suggests inner peace; turbulent water signals emotional upheaval. Rivers often symbolize the flow of life and time. Drowning may reflect feeling overwhelmed. Water appearing frequently means your subconscious is processing deep emotions \u2014 pay attention to the water\x27s behavior, it mirrors yours."],
["\uD83D\uDEAA","Doorway","Thresholds, choices, transitions","9 times","Doorways represent the moment before change. An open door means opportunity is available. A locked door suggests something is blocking your path. Walking through a doorway signals you\x27re ready for a transition. If doorways keep appearing, you\x27re at a decision point in your waking life \u2014 your dreams are rehearsing the choice."],
["\uD83E\uDEB6","Flight","Freedom, perspective, confidence","7 times","Flying dreams are among the most common and exhilarating. They represent freedom from limitations, a desire to rise above problems, or a sense of personal power. If you\x27re flying easily, you feel in control. Struggling to fly suggests self-doubt. Flying dreams often increase during creative breakthroughs."],
["\uD83C\uDF33","Tree","Growth, memory, branching ideas","4 times","Trees symbolize your personal growth, family roots, and branching possibilities. A healthy tree suggests vitality; a dying tree may signal neglected aspects of yourself. Climbing a tree represents ambition. The roots connect to your past, branches to your future. Trees in dreams often appear when you\x27re growing as a person."],
["\u263D","Moon","Cycles, intuition, timing","6 times","The moon in dreams connects to your intuitive side, emotional cycles, and the rhythm of your inner life. A full moon amplifies vividness and emotion. A new moon suggests new beginnings. The moon often appears at turning points \u2014 trust the timing it reveals."],
["\uD83D\uDDDD","Key","Access, hidden knowledge","5 times","Keys represent solutions, access to hidden parts of yourself, and readiness to unlock something new. Finding a key means an answer is close. Losing a key suggests you\x27re not ready yet. A golden key points to something valuable about to be discovered."],
["\uD83C\uDF0A","Ocean","Depth, emotion, creative unknown","5 times","The ocean represents the vast unconscious mind. Its depth mirrors the depth of your emotions and creativity. Calm oceans suggest emotional balance; storms signal inner turmoil. Swimming in the ocean means you\x27re exploring your deeper self. The ocean often appears when deep emotions are stirring."],
["\uD83C\uDFE0","House","Identity, memory, inner rooms","3 times","Houses represent your psyche \u2014 different rooms are different aspects of yourself. The basement is your subconscious. The attic is old memories. Discovering new rooms means you\x27re finding new parts of yourself. A childhood home connects to foundational experiences."],
["\uD83E\uDE9E","Mirror","Self-awareness, reflection, truth","3 times","Mirrors in dreams represent self-examination and truth. Your reflection may look different \u2014 this reveals how you truly see yourself versus how you present to the world. A broken mirror suggests a fractured self-image. Looking into a mirror is your subconscious asking you to be honest."],
["\uD83C\uDF09","Bridge","Connection, transition, integration","2 times","Bridges symbolize transitions between two states of being. Crossing a bridge means you\x27re moving from one life phase to another. A broken bridge suggests fear of change. Building a bridge means you\x27re creating connections. Bridges appear when you\x27re integrating two parts of your life."],
["\uD83D\uDC0D","Snake","Transformation, healing, rebirth","4 times","Snakes represent transformation, hidden fears, and healing energy. A snake shedding its skin signals personal rebirth. Being bitten may mean a wake-up call. Snakes often appear during major personal changes \u2014 they\x27re ancient symbols of renewal and the life force."],
["\uD83E\uDD8B","Butterfly","Rebirth, becoming new","2 times","Butterflies represent transformation and becoming a new version of yourself. The cocoon stage is struggle; the emergence is liberation. Butterflies in dreams signal you\x27re in the process of profound personal change."],
["\uD83D\uDC31","Cat","Independence, mystery, intuition","2 times","Cats in dreams represent independence, mystery, and feminine intuition. A friendly cat suggests you should trust your instincts more. A hostile cat may signal someone in your life is being deceptive. Cats remind you to be self-reliant."],
["\uD83D\uDC26","Bird","Freedom, messages, perspective","3 times","Birds represent freedom, spiritual messages, and the ability to see from a higher perspective. A bird in flight means liberation. A caged bird suggests feeling trapped. Different birds carry different meanings \u2014 eagles for power, doves for peace, ravens for mystery."],
["\u2B50","Stars","Hope, guidance, destiny","2 times","Stars represent hope, direction, and destiny. Looking at stars means you\x27re seeking guidance. A shooting star suggests a wish or fleeting opportunity. Stars remind you to look up from daily concerns and remember the bigger picture."],
["\uD83C\uDF27","Rain","Emotional release, renewal","2 times","Rain symbolizes emotional cleansing and renewal. Gentle rain is healing; storms represent intense emotional processing. Getting wet in rain means you\x27re allowing yourself to feel. Rain often appears after difficult waking experiences as your psyche washes clean."],
["\u2B07","Falling","Loss of control, letting go","3 times","Falling dreams are extremely common and usually reflect anxiety about losing control, fear of failure, or the need to let go. The feeling of falling often jolts you awake \u2014 this is your brain\x27s alarm system. Falling peacefully, however, can mean surrender and trust."],
["\uD83C\uDFC3","Running","Avoidance or pursuit","2 times","Running in dreams reflects avoidance or pursuit in waking life. Being chased means you\x27re avoiding confronting something. Chasing something means you\x27re pursuing a goal. Running in slow motion suggests frustration with progress. The key is: what are you running from or toward?"],
["\uD83D\uDC51","Crown","Authority, self-worth, power","1 times","Crowns represent authority, recognition, and stepping into your power. Wearing a crown means you\x27re ready to lead. Seeing someone else crowned may reflect admiration or envy. Your dream is telling you to own your worth."],
["\u26F0","Mountain","Challenge, ambition, ascent","1 times","Mountains represent challenges, ambition, and spiritual growth. Climbing means you\x27re working toward a goal. Standing at the summit is achievement. Looking up at a mountain may feel overwhelming but also inspiring. The journey matters as much as the peak."],
["\uD83D\uDD04","Recurring","Unresolved message repeating","3 times","Recurring dreams carry an unresolved message from your subconscious. They repeat because you haven\x27t addressed the underlying issue. Pay attention to what stays the same across repetitions \u2014 that\x27s the core message. Once you address it in waking life, the dream usually stops."],
["\uD83D\uDD2E","Prophetic","Dreams that predict events","1 times","Some dreams seem to predict future events. Whether this is pattern recognition, intuition, or something deeper, prophetic dreams feel qualitatively different \u2014 more vivid, more certain. Keep a record and note when a dream\x27s imagery later appears in waking life."],
["\uD83D\uDC3A","Wolf","Instinct, loyalty, wildness","2 times","Wolves represent your primal instincts, loyalty to your pack, and untamed aspects of yourself. A lone wolf suggests independence; a wolf pack reflects community. Wolves howling at the moon connect you to your intuitive, wild nature. If a wolf guides you, follow \u2014 it knows the path through darkness."],
["\uD83E\uDD85","Eagle","Vision, power, spiritual height","1 times","Eagles represent far-seeing vision, power, and the ability to soar above earthly concerns. An eagle in your dream says you need the big picture right now. Eagles also represent authority and the courage to act decisively from a place of clarity."],
["\uD83D\uDC0E","Horse","Freedom, drive, vitality","1 times","Horses symbolize raw energy, freedom, and personal drive. A galloping horse means momentum is building. A wild horse represents untamed passion or desire. Riding a horse smoothly suggests you\x27re in harmony with your energy. A horse that won\x27t move may signal blocked motivation."],
["\uD83D\uDD25","Fire","Passion, destruction, renewal","3 times","Fire in dreams is powerful and dual-natured. It can represent passion, anger, transformation, or creative energy. A controlled fire (candle, campfire) is warmth and inspiration. A wildfire is overwhelming emotion. Walking through fire unharmed means you\x27re emerging stronger from a trial."],
["\u2744","Ice/Snow","Isolation, clarity, preservation","1 times","Ice and snow in dreams represent emotional coldness, clarity of thought, or feelings of isolation. A frozen landscape may mean you\x27re shutting down emotionally. Fresh snow is purity and a clean start. Melting ice suggests thawing emotions and new openness."],
["\uD83C\uDF0B","Volcano","Suppressed emotions, eruption","1 times","Volcanoes represent emotions you\x27ve been suppressing that are building toward eruption. A dormant volcano is a warning \u2014 pressure is accumulating. An erupting volcano means those feelings are finally breaking through. This is often cathartic rather than destructive."],
["\u26A1","Lightning","Sudden insight, revelation","1 times","Lightning represents sudden clarity, inspiration, or shock. It\x27s the moment of realization that changes everything. Lightning illuminates darkness briefly \u2014 your dream is showing you something important that you might miss if you don\x27t pay attention right now."],
["\uD83C\uDF08","Rainbow","Hope, promise, integration","1 times","Rainbows symbolize hope after difficulty, promises kept, and the integration of different aspects of yourself. Seeing a rainbow after a dream storm means the emotional difficulty is resolving. Rainbows also represent the full spectrum of human experience."],
["\uD83D\uDD70","Clock","Time anxiety, urgency, mortality","2 times","Clocks in dreams reflect your relationship with time. A clock running fast means you feel time is slipping away. A stopped clock suggests you\x27re stuck. Clocks without numbers mean you\x27ve lost track of priorities. Time pressure in dreams often mirrors deadline stress in waking life."],
["\uD83D\uDC76","Baby","New beginnings, vulnerability","2 times","Babies in dreams represent new projects, ideas, or aspects of yourself that need nurturing. Forgetting a baby suggests neglecting something new and important. A happy baby means your new venture is thriving. This is rarely about actual babies \u2014 it\x27s about what\x27s newly born in your life."],
["\uD83D\uDE97","Vehicle","Life direction, control","2 times","Vehicles represent your path through life and how much control you feel. Driving smoothly = on track. Car out of control = life feels chaotic. Backseat = someone else is controlling your direction. The condition of the vehicle reflects your sense of personal power."],
["\uD83D\uDC80","Death","Transformation, endings, rebirth","1 times","Death in dreams almost never predicts literal death. It represents the end of something \u2014 a relationship, a phase, a belief, a habit. Dream death makes room for something new. It\x27s one of the most transformative dream symbols and often precedes major personal growth."],
["\u2696","Scales/Balance","Justice, decision, equilibrium","1 times","Scales represent a decision that needs to be weighed carefully. You\x27re trying to balance competing demands. Tipped scales suggest an imbalance in your life that needs correcting. This symbol often appears when fairness is a concern."],
["\uD83D\uDCDA","Book","Knowledge, memory, life story","1 times","Books represent accumulated knowledge, memory, and your personal narrative. An open book means you\x27re ready to learn. A closed book suggests hidden information. Writing in a book means you\x27re actively creating your story. A library represents the vast repository of your experiences."],
["\uD83C\uDFF0","Castle","Ambition, protection, isolation","1 times","Castles represent your ambitions, the walls you build around yourself, and your sense of personal sovereignty. Exploring castle rooms mirrors self-discovery. A castle under siege suggests your defenses are being tested. A ruined castle may mean old ambitions need rebuilding."],
["\uD83C\uDF0C","Galaxy/Space","Infinite possibility, insignificance","1 times","Space and galaxies represent the vastness of possibility and your place in something larger than yourself. Floating in space can feel liberating or terrifying depending on context. Stars represent goals. Black holes represent fears of the unknown. Space dreams expand your perspective."],
["\uD83D\uDC8D","Ring","Commitment, cycles, wholeness","1 times","Rings symbolize commitment, eternal cycles, and completeness. Finding a ring suggests a commitment is forming. Losing a ring means anxiety about a relationship or promise. A broken ring signals broken trust. The circle shape represents something that has no end."],
["\uD83C\uDFA8","Colors","Emotional states, energy","2 times","Vivid colors in dreams amplify emotional content. Red = passion/anger. Blue = calm/sadness. Green = growth/healing. Gold = wisdom/value. Black = unknown/fear. White = purity/clarity. Purple = spirituality. If your dream is unusually colorful, your emotions are running high."],
["\uD83E\uDDD1\u200D\uD83E\uDD1D\u200D\uD83E\uDDD1","Strangers","Unknown self, new aspects","2 times","Strangers in dreams often represent parts of yourself you haven\x27t met yet. A helpful stranger is your inner wisdom. A threatening stranger is a fear you haven\x27t faced. Pay attention to what the stranger says or does \u2014 they\x27re delivering a message from your subconscious."],
["\uD83C\uDFB6","Music","Harmony, emotion, memory","1 times","Music in dreams connects to deep emotional states and memories. Hearing beautiful music means you\x27re in harmony. Discordant music signals internal conflict. Specific songs may trigger important memories. If you\x27re making music, you\x27re expressing something that words can\x27t capture."],
["\u2602","Umbrella","Protection, preparedness","1 times","Umbrellas represent your emotional defenses and preparedness for difficulties. An open umbrella means you\x27re shielding yourself effectively. A broken umbrella suggests your defenses aren\x27t working. Forgetting your umbrella means you feel unprepared for emotional challenges ahead."],
["\uD83C\uDF3B","Garden","Inner growth, tended potential","1 times","Gardens represent the parts of yourself you actively cultivate. A flourishing garden means your efforts are bearing fruit. A neglected garden suggests you\x27re ignoring personal growth. Planting seeds is setting intentions. Weeds represent problems you\x27ve been avoiding."],
["\uD83E\uDEA8","Teeth","Self-image, anxiety, power","3 times","Teeth falling out is one of the most common dream symbols worldwide. It reflects anxiety about appearance, communication, or personal power. Losing teeth = feeling powerless or embarrassed. Strong teeth = confidence. This dream often surfaces during times of change or self-doubt."],
["\uD83D\uDE36","Being Naked","Vulnerability, exposure, truth","2 times","Dreaming of being naked in public reflects vulnerability, fear of exposure, or the desire to be your authentic self. If others notice, you fear judgment. If nobody cares, your anxiety is self-imposed. This dream asks: what are you trying to hide, and what happens if you stop?"],
["\u231B","Hourglass","Time running out, patience","1 times","Hourglasses represent the passage of time and a sense that something is finite. An hourglass running out creates urgency. A full hourglass suggests you have more time than you think. Flipping an hourglass means you\x27re resetting or getting a second chance."]

function genStars(){
var c=document.getElementById("stars");if(!c)return;c.innerHTML="";
var light=theme==="Glacier";
var count=light?60:80;
for(var i=0;i<count;i++){
var s=document.createElement("div");s.className="star";
var size=Math.random()*(light?2:2.5)+(light?0.8:0.5);
s.style.width=size+"px";s.style.height=size+"px";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.setProperty("--dur",(Math.random()*3+2)+"s");
s.style.setProperty("--bright",Math.random()*0.6+0.3);
s.style.animationDelay=Math.random()*4+"s";
if(light){
if(Math.random()>0.5){s.style.background="#0A84FF";s.style.boxShadow="0 0 "+(size*3)+"px rgba(10,132,255,0.35)";}
else if(Math.random()>0.4){s.style.background="#0E2B5C";s.style.boxShadow="0 0 "+(size*2)+"px rgba(14,43,92,0.25)";}
else{s.style.background="rgba(7,17,31,0.3)";s.style.boxShadow="0 0 "+(size*2)+"px rgba(7,17,31,0.15)";}
}else{
if(Math.random()>0.65){s.style.background="#4FCBFF";s.style.boxShadow="0 0 "+(size*3)+"px rgba(79,203,255,0.5)";}
else if(Math.random()>0.7){s.style.background="#C7D0DB";s.style.boxShadow="0 0 "+(size*2)+"px rgba(199,208,219,0.4)";}
else{s.style.background="#fff";s.style.boxShadow="0 0 "+(size*2)+"px rgba(255,255,255,0.3)";}
}
c.appendChild(s);
}}
