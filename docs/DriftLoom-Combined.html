<!DOCTYPE html>
<html lang="en">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:#0a0f1a;display:flex;align-items:center;justify-content:center;min-height:100vh}
.phone{width:375px;height:812px;border-radius:52px;border:8px solid #1a1a2e;background:#02040A;overflow:hidden;position:relative;box-shadow:0 40px 80px rgba(0,0,0,0.5),0 0 0 2px #222}
.notch{width:140px;height:32px;background:#1a1a2e;border-radius:0 0 20px 20px;margin:0 auto;position:relative;z-index:10}
.screen{height:calc(100% - 32px);overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative}
.screen::-webkit-scrollbar{display:none}
.hdr{padding:14px 18px 10px;display:flex;justify-content:space-between;align-items:center}
.mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#0E2B5C,#4FCBFF);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#EAF6FF}
.cnt{padding:0 16px 90px}
.c{background:rgba(7,17,31,0.85);border:1px solid rgba(79,203,255,0.08);border-radius:16px;padding:16px;margin-bottom:12px}
.cd{background:linear-gradient(135deg,#02040A,#07111F);border:1px solid rgba(79,203,255,0.06);border-radius:16px;padding:16px;margin-bottom:12px}
.ca{background:linear-gradient(135deg,rgba(14,43,92,0.4),rgba(79,203,255,0.08));border:1px solid rgba(79,203,255,0.15);border-radius:16px;padding:16px;margin-bottom:12px}
.lb{font-size:10px;font-weight:700;color:#5A6A7A;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.lc{font-size:10px;font-weight:700;color:#4FCBFF;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.lg{font-size:10px;font-weight:700;color:#d4a44c;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}

h3{font-size:15px;font-weight:700;color:#EAF6FF;letter-spacing:-0.2px}
.b{font-size:13px;color:#C7D0DB;line-height:1.6}
.bs{font-size:12px;color:#5A6A7A;line-height:1.5}
.fx{display:flex;align-items:center;gap:10px}
.fb{display:flex;justify-content:space-between;align-items:center}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.btn{padding:14px;border-radius:14px;background:#4FCBFF;text-align:center;cursor:pointer;margin-bottom:10px;font-weight:700;font-size:14px;color:#02040A}
.bt2{padding:12px;border-radius:14px;border:1.5px solid #4FCBFF;text-align:center;cursor:pointer;margin-bottom:10px;font-weight:700;font-size:13px;color:#4FCBFF}
.bg{padding:10px;border-radius:12px;border:1px solid rgba(79,203,255,0.08);text-align:center;cursor:pointer;font-size:13px;color:#C7D0DB}
.inp{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(79,203,255,0.08);background:rgba(14,43,92,0.15);color:#EAF6FF;font-size:14px;outline:none;box-sizing:border-box;font-family:inherit}
.inp::placeholder{color:#5A6A7A}
.bd{display:inline-block;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700}
.bc{background:rgba(79,203,255,0.12);color:#4FCBFF;border:1px solid rgba(79,203,255,0.2)}
.bgo{background:rgba(212,164,76,0.12);color:#d4a44c;border:1px solid rgba(212,164,76,0.2)}
.bgr{background:rgba(46,204,113,0.12);color:#2ecc71;border:1px solid rgba(46,204,113,0.2)}

.st .n{font-size:22px;font-weight:800;color:#EAF6FF;letter-spacing:-0.5px}
.st .l{font-size:10px;color:#5A6A7A;margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
.dv{border-top:1px solid rgba(79,203,255,0.08);margin:12px 0}
.or{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.fr{padding:14px;border-radius:14px;background:rgba(14,43,92,0.25);border:1px solid rgba(79,203,255,0.08);margin-bottom:8px;cursor:pointer}
.pb{height:4px;border-radius:2px;background:rgba(79,203,255,0.1);margin-top:8px;overflow:hidden}
.pf{height:100%;border-radius:2px;background:#4FCBFF}

.pl{padding:10px;border-radius:14px;text-align:center;cursor:pointer}
.tabs{position:absolute;bottom:0;left:0;right:0;height:62px;display:flex;align-items:center;justify-content:space-around;background:rgba(2,4,10,0.96);border-top:1px solid rgba(79,203,255,0.08);z-index:10;padding-bottom:4px}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 7px;border-radius:10px;user-select:none}
.tab.on{background:rgba(79,203,255,0.08)}
.stg{background:rgba(7,17,31,0.85);border:1px solid rgba(79,203,255,0.08);border-radius:16px;margin-bottom:10px;overflow:hidden}
.mg .pl{border:0.5px solid rgba(79,203,255,0.08);background:rgba(14,43,92,0.25)}

.modal{position:absolute;inset:0;background:rgba(2,4,10,0.96);z-index:20;overflow-y:auto;padding:24px 16px;display:none}
.modal.show{display:block}
</style>
</head>
<body>
<div class="phone"><div class="notch"></div>

</div></div>
<script>
let t=0,ms=null;
const T=["Today's Loom","Capture","Loom","Dreams","Vault","Settings"];

function bar(){document.getElementById("bar").innerHTML=tabs.map((x,i)=>`<div class="tab ${i===t?"on":""}" onclick="go(${i})"><div style="font-size:16px;color:${i===t?"#4FCBFF":"#5A6A7A"}">${x.i}</div><span style="font-size:9px;font-weight:700;color:${i===t?"#4FCBFF":"#5A6A7A"}">${x.l}</span></div>`).join("");}

function rr(){const c=document.getElementById("cnt");[today,capture,loom,dreams,vault,settings][t](c);}

function today(c){
  c.innerHTML=`
  <div class="ca"><div class="fb"><div class="lc">CAPTURE STREAK</div><span class="bd bgo">🔥 3 days</span></div><div style="display:flex;gap:4px;margin-top:8px">${"MTWTFSS".split("").map((x,i)=>`<div style="width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;background:${i<3?"rgba(79,203,255,0.15)":"rgba(14,43,92,0.25)"};border:1px solid ${i<3?"rgba(79,203,255,0.3)":"rgba(79,203,255,0.08)"}">${i<3?"🔥":""}</div>`).join("")}</div><div class="bs" style="margin-top:8px">3 fragments + 2 dreams this week</div></div>

  <div class="cd"><div class="fb"><div class="lg">🌙 TONIGHT'S DREAM</div><span class="bs">🌓 First Quarter</span></div><div style="display:flex;gap:8px;margin-top:10px">${[["72%","Vivid","#4FCBFF"],["15%","Lucid","#ffd700"],["8%","Nightmare","#ff6b6b"]].map(f=>`<div class="pl" style="flex:1;background:${f[2]}10;border:0.5px solid ${f[2]}22"><div style="font-size:16px;font-weight:700;color:${f[2]}">${f[0]}</div><div style="font-size:10px;color:#5A6A7A">${f[1]}</div></div>`).join("")}</div></div>

  <div class="c"><div class="lg">☁️ CLOUD ROOMS</div><div class="g3">${[["🌫","Calm","#4FCBFF"],["✨","Starlight","#ffd700"],["🌊","Ocean","#0E9AAA"],["🔥","Ember","#ff6b6b"],["🌙","Moon","#4FCBFF"],["🌌","Aurora","#9b59b6"]].map(r=>`<div class="pl" style="background:${r[2]}10;border:0.5px solid ${r[2]}22"><div style="font-size:18px">${r[0]}</div><div style="font-size:10px;font-weight:700;color:${r[2]};margin-top:2px">${r[1]}</div></div>`).join("")}</div></div>
  <div class="c"><div class="lg">🎵 SLEEP SOUNDS</div><div class="g4">${[["🌧","Rain","#4FCBFF"],["🌊","Ocean","#0E9AAA"],["🔥","Fire","#ff6b6b"],["🌲","Forest","#2ecc71"],["🌬","Wind","#9b59b6"],["🦗","Night","#5A6A7A"],["🎹","Piano","#4FCBFF"],["🕊","Silence","#d4a44c"]].map(s=>`<div class="pl" style="background:${s[2]}10;border:0.5px solid ${s[2]}22"><div style="font-size:16px">${s[0]}</div><div style="font-size:9px;font-weight:700;color:${s[2]};margin-top:2px">${s[1]}</div></div>`).join("")}</div></div>`;
}

function capture(c){
  c.innerHTML=`

  <div class="btn">Drop Fragment ↓</div>
  <div class="dv" style="margin:16px 0;text-align:center"><span class="bs">— or log a dream —</span></div>
  <div class="c" style="border-color:rgba(165,94,234,0.15)"><div style="font-size:10px;font-weight:700;color:#a55eea;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px">🌙 DREAM ENTRY</div><input class="inp" placeholder="Dream title..." style="margin-bottom:8px"><textarea class="inp" style="resize:none;min-height:80px" placeholder="What happened in your dream?"></textarea>

  <div style="margin-top:10px"><div class="lb">GENRE</div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px">${[["🎬","Thriller"],["💕","Romance"],["🚀","Sci-Fi"],["🧙","Fantasy"],["😂","Comedy"],["👻","Horror"],["🔍","Mystery"],["⚔️","Adventure"],["🎭","Drama"],["🌀","Surreal"]].map(g=>`<div class="pl" style="background:rgba(14,43,92,0.25);border:0.5px solid rgba(79,203,255,0.08);padding:6px"><div style="font-size:14px">${g[0]}</div><div style="font-size:7px;font-weight:700;color:#5A6A7A">${g[1]}</div></div>`).join("")}</div></div>
  <div style="margin-top:10px"><div class="lb">SYMBOLS</div><input class="inp" placeholder="water, flying, forest..."></div>

  <div class="bt2" style="border-color:#a55eea;color:#a55eea" onclick="pay()">🔮 Read This Dream</div></div>`;

function loom(c){
  const moons=["🌑","🌒","🌓","🌔","🌕","🌖","🌗","🌘"];
  const mn=["New Moon","Waxing Crescent","First Quarter","Waxing Gibbous","Full Moon","Waning Gibbous","Last Quarter","Waning Crescent"];
  c.innerHTML=`
  <div class="sig"><div class="fb" style="margin-bottom:10px"><div class="lc" style="margin:0">🔗 SIGNAL #1</div><span class="bd bc">Strong</span></div><h2>Creative capture tool</h2><div class="b" style="margin-top:6px">5 fragments + 2 dreams connect to this concept. Your waking mind AND your subconscious are circling the same idea.</div><div class="dv"></div>
  <div class="lb">CONNECTED</div>${[["📝","App for random thoughts"],["🌙","Dream: city of glass towers = ideas"],["🎙","Voice: better capture flow"],["📸","Screenshot of note-taking UI"],["🌙","Dream: underwater library"],["🔗","Article: second-brain apps"],["💡","Fragments → projects pipeline"]].map((f,i)=>`<div class="fx" style="padding:6px 0;${i<6?"border-bottom:1px solid rgba(79,203,255,0.08)":""}"><div class="or" style="background:rgba(14,43,92,0.25);border:1px solid rgba(79,203,255,0.08);font-size:12px">${f[0]}</div><div style="font-size:12px;color:#C7D0DB">${f[1]}</div></div>`).join("")}

  <div class="c"><div class="lb">AI MENTORS</div><div class="g3">${[["🧠","Founder"],["🎨","Designer"],["✍️","Writer"],["🎬","Filmmaker"],["🎮","Game Dev"],["🔬","Researcher"]].map(m=>`<div class="pl" style="background:rgba(14,43,92,0.25);border:1px solid rgba(79,203,255,0.08)"><div style="font-size:20px">${m[0]}</div><div style="font-size:10px;font-weight:700;color:#C7D0DB;margin-top:3px">${m[1]}</div></div>`).join("")}</div></div>

  <div class="c"><div class="lg">♈ DREAM ZODIAC</div><div class="g4">${[["♈","Aries","#ff6b6b"],["♉","Taurus","#4ecdc4"],["♊","Gemini","#ffd700"],["♋","Cancer","#4FCBFF"],["♌","Leo","#ff9f43"],["♍","Virgo","#a8e6cf"],["♎","Libra","#4FCBFF"],["♏","Scorpio","#c44569"],["♐","Sag.","#f8b739"],["♑","Cap.","#778ca3"],["♒","Aqua.","#45aaf2"],["♓","Pisces","#a55eea"]].map(z=>`<div class="pl" style="background:rgba(14,43,92,0.25);border:0.5px solid rgba(79,203,255,0.08)"><div style="font-size:18px">${z[0]}</div><div style="font-size:8px;font-weight:700;color:#5A6A7A">${z[1]}</div></div>`).join("")}</div></div>

  <div class="c"><div class="lg">💜 AFFIRMATION</div><div style="font-size:16px;font-weight:700;font-style:italic;text-align:center;color:#EAF6FF;line-height:1.5">${["Your dreams are letters from your deeper self.","Every dream makes the next one clearer.","Your subconscious is wiser than you know.","Tonight's dreams are already forming.","The patterns reveal who you're becoming.","You author your dream world.","Each dream is a gift."][d]}</div></div>`;

function dreams(c){
  const stages=[["🌅","Awake","Threshold","#d4a44c","Set a dream intention.","5-20 min"],["🌊","N1 — Light Drift","NREM","#4FCBFF","First dream fragments.","1-7 min"],["💫","N2 — Weaving","NREM","#1a6cd4","Spindles sort memories.","10-25 min"],["🌑","N3 — Deep","Slow-wave","#0E2B5C","Body repairs.","20-40 min"],["✨","REM — Theatre","REM","#4FCBFF","Vivid dreams unfold.","10-60 min"]];
  c.innerHTML=`
