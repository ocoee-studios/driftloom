<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>DriftLoom</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0f1a;display:flex;align-items:center;justify-content:center;min-height:100vh}
.ph{width:375px;height:812px;border-radius:52px;border:8px solid #1a1a2e;background:#02040A;overflow:hidden;position:relative;box-shadow:0 40px 80px rgba(0,0,0,0.5)}
.nt{width:140px;height:32px;background:#1a1a2e;border-radius:0 0 20px 20px;margin:0 auto;z-index:10;position:relative}
.sc{height:calc(100% - 32px);overflow-y:auto;position:relative}.sc::-webkit-scrollbar{display:none}
.hd{padding:14px 18px 10px;display:flex;justify-content:space-between;align-items:center}
.ct{padding:0 16px 90px}
.c{background:rgba(7,17,31,0.85);border:1px solid rgba(79,203,255,0.08);border-radius:16px;padding:16px;margin-bottom:12px}
.cd{background:linear-gradient(135deg,#02040A,#07111F);border:1px solid rgba(79,203,255,0.06);border-radius:16px;padding:16px;margin-bottom:12px}
.ca{background:linear-gradient(135deg,rgba(14,43,92,0.4),rgba(79,203,255,0.08));border:1px solid rgba(79,203,255,0.15);border-radius:16px;padding:16px;margin-bottom:12px}
.lb{font-size:10px;font-weight:700;color:#5A6A7A;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.lc{font-size:10px;font-weight:700;color:#4FCBFF;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.lg{font-size:10px;font-weight:700;color:#d4a44c;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
h2{font-size:18px;font-weight:700;color:#EAF6FF;margin-bottom:4px}h3{font-size:15px;font-weight:700;color:#EAF6FF}
.b{font-size:13px;color:#C7D0DB;line-height:1.6}.bs{font-size:12px;color:#5A6A7A;line-height:1.5}
.fx{display:flex;align-items:center;gap:10px}.fb{display:flex;justify-content:space-between;align-items:center}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.btn{padding:14px;border-radius:14px;background:#4FCBFF;text-align:center;cursor:pointer;margin-bottom:10px;font-weight:700;font-size:14px;color:#02040A}
.bt2{padding:12px;border-radius:14px;border:1.5px solid #4FCBFF;text-align:center;cursor:pointer;margin-bottom:10px;font-weight:700;font-size:13px;color:#4FCBFF}
.bg{padding:10px;border-radius:12px;border:1px solid rgba(79,203,255,0.08);text-align:center;cursor:pointer;font-size:13px;color:#C7D0DB;margin-bottom:8px}
.inp{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(79,203,255,0.08);background:rgba(14,43,92,0.15);color:#EAF6FF;font-size:14px;outline:none;box-sizing:border-box;font-family:inherit}.inp::placeholder{color:#5A6A7A}
.bd{display:inline-block;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700}
.bc{background:rgba(79,203,255,0.12);color:#4FCBFF;border:1px solid rgba(79,203,255,0.2)}
.bgo{background:rgba(212,164,76,0.12);color:#d4a44c;border:1px solid rgba(212,164,76,0.2)}
.bgr{background:rgba(46,204,113,0.12);color:#2ecc71;border:1px solid rgba(46,204,113,0.2)}
.st{text-align:center;padding:12px 6px;border-radius:14px;background:rgba(14,43,92,0.25);border:1px solid rgba(79,203,255,0.08)}.st .n{font-size:20px;font-weight:800;color:#EAF6FF}.st .l{font-size:9px;color:#5A6A7A;margin-top:2px;text-transform:uppercase}
.dv{border-top:1px solid rgba(79,203,255,0.08);margin:12px 0}
.or{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.fr{padding:12px;border-radius:14px;background:rgba(14,43,92,0.25);border:1px solid rgba(79,203,255,0.08);margin-bottom:8px}
.pb{height:4px;border-radius:2px;background:rgba(79,203,255,0.1);margin-top:8px;overflow:hidden}.pf{height:100%;border-radius:2px;background:#4FCBFF}
.sig{padding:16px;border-radius:16px;border:1.5px solid rgba(79,203,255,0.2);background:linear-gradient(135deg,rgba(14,43,92,0.3),rgba(79,203,255,0.05));margin-bottom:12px}
.pl{padding:10px;border-radius:14px;text-align:center;cursor:pointer}
.tb{position:absolute;bottom:0;left:0;right:0;height:62px;display:flex;align-items:center;justify-content:space-around;background:rgba(2,4,10,0.96);border-top:1px solid rgba(79,203,255,0.08);z-index:10;padding-bottom:4px}
.ta{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 7px;border-radius:10px;user-select:none}.ta.on{background:rgba(79,203,255,0.08)}
.sg{background:rgba(7,17,31,0.85);border:1px solid rgba(79,203,255,0.08);border-radius:16px;margin-bottom:10px;overflow:hidden}
.mg .pl{border:0.5px solid rgba(79,203,255,0.08);background:rgba(14,43,92,0.25)}.mg .pl.on{border:1.5px solid #4FCBFF;background:rgba(79,203,255,0.12)}
.md{margin-top:8px;padding:12px;border-radius:14px;border:0.5px solid rgba(79,203,255,0.15)}
.mo{position:absolute;inset:0;background:rgba(2,4,10,0.96);z-index:20;overflow-y:auto;padding:24px 16px;display:none}.mo.show{display:block}
.ck{width:20px;height:20px;border-radius:5px;border:2px solid #4FCBFF;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:white}.ck.on{background:#4FCBFF}
</style></head><body>
<div class="ph"><div class="nt"></div><div class="sc" id="sc">
<div class="hd" id="hd"></div><div class="ct" id="ct"></div><div class="tb" id="tb"></div><div class="mo" id="pw"></div>
</div></div>
